<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loading interactive paper…</title>
<style>
  html,body{margin:0;padding:0;background:#f6f2e8;color:#111418;font-family:Georgia,serif}
  .loading{min-height:100vh;display:grid;place-items:center;padding:24px}
  .card{max-width:560px;border:1px solid #d9d5cb;border-radius:14px;background:#fbf9f2;padding:24px 28px;box-shadow:0 8px 24px rgba(0,0,0,.04)}
  .mono{font:12px ui-monospace,monospace;color:#6b7280}
</style>
<div class="loading"><div class="card"><h1 style="margin:0 0 8px;font-size:28px">Loading interactive paper…</h1><div class="mono">paper.base.html + paper-fixes.js</div></div></div>
<script>
fetch('paper.base.html').then(r=>r.text()).then(html=>{
  const fixTag = '<script src="paper-fixes.js"></' + 'script>';
  html = html.includes('</body>') ? html.replace('</body>', fixTag + '</body>') : html + fixTag;
  document.open();
  document.write(html);
  document.close();
}).catch(err=>{
  document.body.innerHTML = '<div class="loading"><div class="card"><h1 style="margin:0 0 8px;font-size:28px">Load failed</h1><div class="mono">' + String(err) + '</div></div></div>';
});
</script>
