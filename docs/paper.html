<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirecting…</title>
<style>
  html,body{margin:0;padding:0;background:#f6f2e8;color:#111418;font-family:Georgia,serif}
  .card{max-width:640px;margin:12vh auto 0;padding:22px 24px;border:1px solid #d9d5cb;border-radius:14px;background:#fbf9f2;box-shadow:0 8px 24px rgba(0,0,0,.04)}
  .mono{font:12px ui-monospace,monospace;color:#6b7280}
  a{color:#394150}
</style>
<div class="card">
  <h1 style="margin:0 0 8px;font-size:28px">Opening interactive paper…</h1>
  <p style="margin:0 0 10px">This entry now jumps directly to the full paper page, which avoids the iframe focus issue that made controls feel sticky.</p>
  <div class="mono">Redirect target: paper.base.v2.html</div>
  <p><a id="direct-link" href="paper.base.v2.html">Open directly if not redirected</a></p>
</div>
<script>
(() => {
  const target = 'paper.base.v2.html' + (location.hash || '');
  document.getElementById('direct-link').href = target;
  location.replace(target);
})();
</script>
